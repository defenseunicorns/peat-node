kind: ZarfPackageConfig
metadata:
  name: peat-node
  description: Peat mesh sidecar for DDIL-resilient fleet state sync
  version: 0.3.1
  url: https://github.com/defenseunicorns/peat-node

components:
  - name: peat-node
    required: true
    description: Deploy peat-node mesh node
    images:
      - ghcr.io/defenseunicorns/peat-node:v0.3.1
    charts:
      - name: peat-node
        localPath: chart/peat-node
        namespace: peat-system
        version: 0.3.1
        valuesFiles:
          - chart/peat-node/values.yaml
    actions:
      onDeploy:
        after:
          - wait:
              cluster:
                kind: deployment
                name: peat-node
                namespace: peat-system
                condition: available
