name: NATS bridge end-to-end

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nats-bridge-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose:
    name: Isolated Core NATS bridge proof
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Confirm Docker and Compose
        run: |
          docker --version
          docker compose version

      - name: Install jq when absent
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi

      - name: Run isolated NATS bridge proof
        run: ./test/nats-bridge-e2e.sh
