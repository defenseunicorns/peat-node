name: Release

# Tag-triggered release pipeline for peat-node.
#
# On push of a `v*` tag, this workflow:
#   1. Reuses the regular CI gates (format, clippy, tests, build, helm-lint).
#   2. Verifies the tag version matches `package.version` in Cargo.toml.
#   3. Builds and pushes a multi-arch container image to GHCR
#      (linux/amd64 + linux/arm64) using native runners — one job per
#      arch pushing by digest, then a manifest job that combines them
#      into `:vX.Y.Z` and `:latest` tags. Native runners are used
#      instead of QEMU because cross-compiling Rust under emulation is
#      slow and flaky.
#   4. Creates a GitHub release with the CHANGELOG.md entry as the body.
#
# Prerequisites:
#   - Repo must allow `GITHUB_TOKEN` to write packages (Settings →
#     Actions → General → Workflow permissions: Read and write).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  checks: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yaml

  validate-tag:
    name: Validate tag matches Cargo.toml version
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Compare tag vs package version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(cargo metadata --no-deps --format-version=1 \
            | jq -r '.packages[] | select(.name == "peat-node") | .version')
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v$TAG does not match Cargo.toml version $VERSION"
            exit 1
          fi
          echo "Tag v$TAG matches Cargo.toml version $VERSION"

  build:
    name: Build & push (${{ matrix.platform.name }})
    needs: validate-tag
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux/amd64
            runner: ubuntu-24.04
            suffix: amd64
          - name: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform.name }}
          # Push by digest only — the manifest job assembles the final
          # multi-arch tags. Suppresses the per-arch tag clutter on the
          # package page.
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=peat-node-${{ matrix.platform.suffix }}
          cache-to: type=gha,scope=peat-node-${{ matrix.platform.suffix }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.platform.suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: Assemble multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # `:latest` only on stable releases — pre-releases (rc, alpha,
          # beta) keep their own version tag but don't move `:latest`.
          case "$GITHUB_REF_NAME" in
            *-rc.*|*-alpha.*|*-beta.*)
              echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${GITHUB_REF_NAME} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          TAG_ARGS=""
          for tag in ${{ steps.tags.outputs.tags }}; do
            TAG_ARGS="$TAG_ARGS -t $tag"
          done
          # shellcheck disable=SC2086
          docker buildx imagetools create $TAG_ARGS \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          for tag in ${{ steps.tags.outputs.tags }}; do
            docker buildx imagetools inspect "$tag"
          done

  peat-cli-binaries:
    # Phase 6 of peat-node ADR-001: attach the `peat` operator binary
    # for every supported platform to each tagged release. Native runners
    # per target — cross-compilation isn't necessary and avoids the
    # QEMU/cross-rs flakiness peat-node hit on the container side.
    name: peat-cli (${{ matrix.target.label }})
    needs: validate-tag
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - label: linux-x86_64
            os: ubuntu-latest
            archive: tar.gz
          - label: linux-aarch64
            os: ubuntu-24.04-arm
            archive: tar.gz
          - label: macos-aarch64
            os: macos-14
            archive: tar.gz
          - label: windows-x86_64
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.target.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Cache cargo registry + target/ per target so each release doesn't
      # rebuild peat-cli's full dependency tree from scratch. Keyed per matrix
      # target (distinct OS/arch) so the 4 platforms don't collide.
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target.label }}
      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf
      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        # GitHub-releases protoc via the maintained action — avoids the
        # community Chocolatey feed's intermittent 504s.
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build peat-cli
        run: cargo build --release -p peat-cli
      - name: Smoke `peat --help` (Unix)
        if: runner.os != 'Windows'
        run: ./target/release/peat --help > /dev/null
      - name: Smoke `peat --help` (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\target\release\peat.exe --help > $null
      - name: Package (tar.gz)
        if: matrix.target.archive == 'tar.gz'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="peat-${VERSION}-${{ matrix.target.label }}"
          mkdir "$STAGE"
          cp target/release/peat "$STAGE/"
          cp crates/peat-cli/README.md "$STAGE/README.md"
          cp LICENSE "$STAGE/"
          tar czf "$STAGE.tar.gz" "$STAGE"
          shasum -a 256 "$STAGE.tar.gz" > "$STAGE.tar.gz.sha256"
      - name: Package (zip)
        if: matrix.target.archive == 'zip'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          $stage = "peat-${version}-${{ matrix.target.label }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item target\release\peat.exe -Destination $stage
          Copy-Item crates\peat-cli\README.md -Destination "$stage\README.md"
          Copy-Item LICENSE -Destination $stage
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
          (Get-FileHash "$stage.zip" -Algorithm SHA256).Hash | Out-File "$stage.zip.sha256"
      - name: Upload artifact for release job
        uses: actions/upload-artifact@v4
        with:
          name: peat-cli-${{ matrix.target.label }}
          path: |
            peat-*.tar.gz
            peat-*.tar.gz.sha256
            peat-*.zip
            peat-*.zip.sha256
          if-no-files-found: error
          retention-days: 1

  linux-packages:
    name: Debian and RPM packages (${{ matrix.arch.label }})
    needs: validate-tag
    strategy:
      fail-fast: false
      matrix:
        arch:
          - label: x86_64
            runner: ubuntu-24.04
          - label: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-packages-${{ matrix.arch.label }}
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          cargo install cargo-deb --locked
          cargo install cargo-generate-rpm --locked
      - name: Build release binaries
        run: cargo build --release --workspace
      - name: Build packages
        run: |
          cargo deb --no-build
          cargo generate-rpm
      - name: Test Debian systemd install and upgrade
        run: |
          sudo install -d -o root -g root -m 0750 /var/lib/peat-node/automerge
          sudo touch /var/lib/peat-node/automerge/legacy-state
          sudo apt-get install -y "$PWD"/target/debian/*.deb
          test "$(systemctl is-active peat-node.service)" = active
          test "$(systemctl show -p User --value peat-node.service)" = peat
          test "$(sudo stat -c %U:%G /var/lib/peat-node/automerge/legacy-state)" = peat:peat
          old_pid="$(systemctl show -p MainPID --value peat-node.service)"
          sudo chown root:root /var/lib/peat-node/automerge/legacy-state
          sudo apt-get install --reinstall -y "$PWD"/target/debian/*.deb
          test "$(systemctl is-active peat-node.service)" = active
          test "$(systemctl show -p User --value peat-node.service)" = peat
          test "$(sudo stat -c %U:%G /var/lib/peat-node/automerge/legacy-state)" = peat:peat
          new_pid="$(systemctl show -p MainPID --value peat-node.service)"
          test "$new_pid" != "$old_pid"
          curl --retry 20 --retry-delay 1 --retry-all-errors \
            http://127.0.0.1:50051/ >/dev/null
          sudo apt-get remove -y peat-node
          test ! -e /lib/systemd/system/peat-node.service
          sudo rm -rf /var/lib/peat-node
          sudo systemctl daemon-reload
          sudo systemctl reset-failed
          sudo rm -f /etc/peat-node/peat-node.env

      - name: Test Debian package install and startup
        run: |
          docker run --rm \
            -v "$PWD/target/debian:/packages:ro" \
            debian:trixie-slim bash -euxo pipefail -c '
              apt-get update
              install -d -o root -g root -m 0750 /var/lib/peat-node/automerge
              touch /var/lib/peat-node/automerge/legacy-state
              apt-get install -y /packages/*.deb curl
              test "$(stat -c %U /var/lib/peat-node)" = peat
              test "$(stat -c %U:%G /var/lib/peat-node/automerge/legacy-state)" = peat:peat
              test -f /lib/systemd/system/peat-node.service
              systemd-analyze verify /lib/systemd/system/peat-node.service
              test -x /usr/bin/peat
              /usr/bin/peat --help >/dev/null
              set -a
              . /etc/peat-node/peat-node.env
              set +a
              runuser -u peat --preserve-environment -- \
                /usr/bin/peat-node --node-id=package-smoke &
              pid=$!
              trap "kill $pid" EXIT
              curl --retry 20 --retry-delay 1 --retry-all-errors \
                http://127.0.0.1:50051/ >/dev/null
              kill "$pid"
              wait "$pid" || true
              trap - EXIT
              apt-get remove -y peat-node
              test ! -e /lib/systemd/system/peat-node.service
            '
      - name: Test RPM package install and startup
        run: |
          docker run --rm \
            -v "$PWD/target/generate-rpm:/packages:ro" \
            fedora:latest bash -euxo pipefail -c '
              install -d -o root -g root -m 0750 /var/lib/peat-node/automerge
              touch /var/lib/peat-node/automerge/legacy-state
              dnf install -y /packages/*.rpm curl
              test "$(stat -c %U /var/lib/peat-node)" = peat
              test "$(stat -c %U:%G /var/lib/peat-node/automerge/legacy-state)" = peat:peat
              test -f /usr/lib/systemd/system/peat-node.service
              systemd-analyze verify /usr/lib/systemd/system/peat-node.service
              test -x /usr/bin/peat
              /usr/bin/peat --help >/dev/null
              set -a
              . /etc/peat-node/peat-node.env
              set +a
              chroot --userspec=peat:peat / \
                /usr/bin/peat-node --node-id=package-smoke &
              pid=$!
              trap "kill $pid" EXIT
              curl --retry 20 --retry-delay 1 --retry-all-errors \
                http://127.0.0.1:50051/ >/dev/null
              kill "$pid"
              wait "$pid" || true
              trap - EXIT
              dnf remove -y peat-node
              test ! -e /usr/lib/systemd/system/peat-node.service
            '
      - name: Generate checksums
        run: |
          cd target
          sha256sum debian/*.deb generate-rpm/*.rpm \
            > "peat-node-packages-${{ matrix.arch.label }}.sha256"
      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: peat-node-linux-packages-${{ matrix.arch.label }}
          path: |
            target/debian/*.deb
            target/generate-rpm/*.rpm
            target/peat-node-packages-${{ matrix.arch.label }}.sha256
          if-no-files-found: error
          retention-days: 1

  package-repository:
    name: Publish APT and DNF repositories
    needs: linux-packages
    if: ${{ !contains(github.ref_name, '-rc.') && !contains(github.ref_name, '-alpha.') && !contains(github.ref_name, '-beta.') }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/peat-packages
          pattern: peat-node-linux-packages-*
          merge-multiple: true
      - name: Install repository tools
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils createrepo-c gnupg
      - name: Import repository signing key
        env:
          PACKAGE_REPOSITORY_GPG_PRIVATE_KEY: ${{ secrets.PACKAGE_REPOSITORY_GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$PACKAGE_REPOSITORY_GPG_PRIVATE_KEY" ]; then
            echo "::error::PACKAGE_REPOSITORY_GPG_PRIVATE_KEY is not configured"
            exit 1
          fi
          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          mkdir -m 0700 "$GNUPGHOME"
          printf '%s' "$PACKAGE_REPOSITORY_GPG_PRIVATE_KEY" \
            | gpg --batch --import
          fingerprint="$(gpg --batch --with-colons --list-secret-keys \
            | awk -F: '$1 == "fpr" { print $10; exit }')"
          if [ -z "$fingerprint" ]; then
            echo "::error::The configured key contains no private key"
            exit 1
          fi
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
          echo "PACKAGE_REPOSITORY_GPG_FINGERPRINT=$fingerprint" >> "$GITHUB_ENV"
      - name: Build signed APT repository
        env:
          PACKAGE_REPOSITORY_GPG_PASSPHRASE: ${{ secrets.PACKAGE_REPOSITORY_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          site="$RUNNER_TEMP/site"
          apt_root="$site/apt"
          mkdir -p "$apt_root/pool/main/p/peat-node"
          cp /tmp/peat-packages/debian/*.deb "$apt_root/pool/main/p/peat-node/"
          for arch in amd64 arm64; do
            packages_dir="$apt_root/dists/stable/main/binary-$arch"
            mkdir -p "$packages_dir"
            (
              cd "$apt_root"
              apt-ftparchive -a "$arch" packages pool/main \
                > "dists/stable/main/binary-$arch/Packages"
            )
            gzip -9n -c "$packages_dir/Packages" > "$packages_dir/Packages.gz"
          done
          (
            cd "$apt_root"
            apt-ftparchive \
              -o APT::FTPArchive::Release::Origin="Defense Unicorns" \
              -o APT::FTPArchive::Release::Label="Peat Node" \
              -o APT::FTPArchive::Release::Suite="stable" \
              -o APT::FTPArchive::Release::Codename="stable" \
              -o APT::FTPArchive::Release::Architectures="amd64 arm64" \
              -o APT::FTPArchive::Release::Components="main" \
              release dists/stable > dists/stable/Release
          )
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$PACKAGE_REPOSITORY_GPG_PASSPHRASE" \
            --local-user "$PACKAGE_REPOSITORY_GPG_FINGERPRINT" \
            --armor --detach-sign \
            --output "$apt_root/dists/stable/Release.gpg" \
            "$apt_root/dists/stable/Release"
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$PACKAGE_REPOSITORY_GPG_PASSPHRASE" \
            --local-user "$PACKAGE_REPOSITORY_GPG_FINGERPRINT" \
            --armor --clearsign \
            --output "$apt_root/dists/stable/InRelease" \
            "$apt_root/dists/stable/Release"
      - name: Build signed DNF repository
        env:
          PACKAGE_REPOSITORY_GPG_PASSPHRASE: ${{ secrets.PACKAGE_REPOSITORY_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          site="$RUNNER_TEMP/site"
          for arch in x86_64 aarch64; do
            repo="$site/rpm/stable/$arch"
            mkdir -p "$repo"
            cp "/tmp/peat-packages/generate-rpm/"*".$arch.rpm" "$repo/"
            createrepo_c "$repo"
            gpg --batch --yes --pinentry-mode loopback \
              --passphrase "$PACKAGE_REPOSITORY_GPG_PASSPHRASE" \
              --local-user "$PACKAGE_REPOSITORY_GPG_FINGERPRINT" \
              --armor --detach-sign \
              --output "$repo/repodata/repomd.xml.asc" \
              "$repo/repodata/repomd.xml"
          done
          gpg --batch --yes \
            --output "$site/peat-node-archive-key.gpg" \
            --export "$PACKAGE_REPOSITORY_GPG_FINGERPRINT"
          gpg --batch --yes --armor \
            --output "$site/peat-node-archive-key.asc" \
            --export "$PACKAGE_REPOSITORY_GPG_FINGERPRINT"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ runner.temp }}/site
      - name: Deploy package repositories
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: GitHub Release
    needs: [manifest, peat-cli-binaries, linux-packages]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            echo "::warning::No CHANGELOG.md entry found for $VERSION, falling back to auto-generated notes"
            echo "fallback=true" >> "$GITHUB_OUTPUT"
          else
            echo "$NOTES" > /tmp/release-notes.md
            echo "fallback=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create or update GitHub Release
        run: |
          set -euo pipefail
          PRERELEASE_FLAG=""
          case "$GITHUB_REF_NAME" in
            *-rc.*|*-alpha.*|*-beta.*) PRERELEASE_FLAG="--prerelease" ;;
          esac

          if [ "${{ steps.changelog.outputs.fallback }}" = "true" ]; then
            NOTES_ARG="--generate-notes"
          else
            NOTES_ARG="--notes-file /tmp/release-notes.md"
          fi

          # Idempotent: update an existing release rather than failing.
          # $NOTES_ARG is always set above (--notes-file or --generate-notes)
          # and must be passed on both paths — omitting it on the edit path
          # leaves gh with no flags and exits non-zero.
          if gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists, updating..."
            gh release edit "$GITHUB_REF_NAME" $PRERELEASE_FLAG $NOTES_ARG
          else
            gh release create "$GITHUB_REF_NAME" $NOTES_ARG $PRERELEASE_FLAG
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Download peat-cli binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/peat-binaries
          pattern: peat-cli-*
          merge-multiple: true
      - name: Download Linux package artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/peat-packages
          pattern: peat-node-linux-packages-*
          merge-multiple: true
      - name: Attach peat-cli binaries to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd /tmp/peat-binaries
          ls -la
          # --clobber so a re-run of a tag replaces previous assets.
          gh release upload "$GITHUB_REF_NAME" peat-*.tar.gz peat-*.tar.gz.sha256 peat-*.zip peat-*.zip.sha256 --clobber --repo "$GITHUB_REPOSITORY"
      - name: Attach Linux packages to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd /tmp/peat-packages
          gh release upload "$GITHUB_REF_NAME" \
            debian/*.deb generate-rpm/*.rpm peat-node-packages-*.sha256 \
            --clobber --repo "$GITHUB_REPOSITORY"
