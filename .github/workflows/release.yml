name: Release

# Tag-triggered release pipeline for peat-node.
#
# On push of a `v*` tag, this workflow:
#   1. Reuses the regular CI gates (format, clippy, tests, build, helm-lint).
#   2. Verifies the tag version matches `package.version` in Cargo.toml.
#   3. Builds and pushes a multi-arch container image to GHCR
#      (linux/amd64 + linux/arm64) using native runners — one job per
#      arch pushing by digest, then a manifest job that combines them
#      into `:vX.Y.Z` and `:latest` tags. Native runners are used
#      instead of QEMU because cross-compiling Rust under emulation is
#      slow and flaky.
#   4. Creates a GitHub release with the CHANGELOG.md entry as the body.
#
# Prerequisites:
#   - Repo must allow `GITHUB_TOKEN` to write packages (Settings →
#     Actions → General → Workflow permissions: Read and write).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  checks: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yaml

  validate-tag:
    name: Validate tag matches Cargo.toml version
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Compare tag vs package version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(cargo metadata --no-deps --format-version=1 \
            | jq -r '.packages[] | select(.name == "peat-node") | .version')
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v$TAG does not match Cargo.toml version $VERSION"
            exit 1
          fi
          echo "Tag v$TAG matches Cargo.toml version $VERSION"

  build:
    name: Build & push (${{ matrix.platform.name }})
    needs: validate-tag
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux/amd64
            runner: ubuntu-24.04
            suffix: amd64
          - name: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform.name }}
          # Push by digest only — the manifest job assembles the final
          # multi-arch tags. Suppresses the per-arch tag clutter on the
          # package page.
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=peat-node-${{ matrix.platform.suffix }}
          cache-to: type=gha,scope=peat-node-${{ matrix.platform.suffix }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.platform.suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: Assemble multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # `:latest` only on stable releases — pre-releases (rc, alpha,
          # beta) keep their own version tag but don't move `:latest`.
          case "$GITHUB_REF_NAME" in
            *-rc.*|*-alpha.*|*-beta.*)
              echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${GITHUB_REF_NAME} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          TAG_ARGS=""
          for tag in ${{ steps.tags.outputs.tags }}; do
            TAG_ARGS="$TAG_ARGS -t $tag"
          done
          # shellcheck disable=SC2086
          docker buildx imagetools create $TAG_ARGS \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          for tag in ${{ steps.tags.outputs.tags }}; do
            docker buildx imagetools inspect "$tag"
          done

  release:
    name: GitHub Release
    needs: manifest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            echo "::warning::No CHANGELOG.md entry found for $VERSION, falling back to auto-generated notes"
            echo "fallback=true" >> "$GITHUB_OUTPUT"
          else
            echo "$NOTES" > /tmp/release-notes.md
            echo "fallback=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create or update GitHub Release
        run: |
          set -euo pipefail
          PRERELEASE_FLAG=""
          case "$GITHUB_REF_NAME" in
            *-rc.*|*-alpha.*|*-beta.*) PRERELEASE_FLAG="--prerelease" ;;
          esac

          if [ "${{ steps.changelog.outputs.fallback }}" = "true" ]; then
            NOTES_ARG="--generate-notes"
          else
            NOTES_ARG="--notes-file /tmp/release-notes.md"
          fi

          # Idempotent: update an existing release rather than failing.
          if gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists, updating..."
            gh release edit "$GITHUB_REF_NAME" $PRERELEASE_FLAG \
              $(if [ "${{ steps.changelog.outputs.fallback }}" != "true" ]; then echo "--notes-file /tmp/release-notes.md"; fi)
          else
            gh release create "$GITHUB_REF_NAME" $NOTES_ARG $PRERELEASE_FLAG
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
