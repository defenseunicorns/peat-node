name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-clippy-${{ hashFiles('**/Cargo.lock') }}
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-test-${{ hashFiles('**/Cargo.lock') }}
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo test --workspace

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-build-${{ hashFiles('**/Cargo.lock') }}
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo build --workspace --release
      - name: peat binary smoke test
        run: |
          set -euo pipefail
          PEAT=./target/release/peat
          test -x "$PEAT"
          "$PEAT" --version
          "$PEAT" --help > /dev/null
          for sub in query observe create update delete; do
            "$PEAT" "$sub" --help > /dev/null
          done
          # query handler is wired (Phase 2). With a non-existent creds path
          # it must exit 2 (auth) per the ADR-001 exit-code table, with
          # empty stdout and the explanation on stderr.
          set +e
          "$PEAT" --creds /nonexistent.yaml query contacts > stdout.txt 2> stderr.txt
          code=$?
          set -e
          test "$code" = "2"
          test ! -s stdout.txt
          grep -q "authentication failure" stderr.txt
          # observe is wired (Phase 3) — same auth-failure path as query when
          # creds are absent.
          set +e
          "$PEAT" --creds /nonexistent.yaml observe contacts > stdout.txt 2> stderr.txt
          code=$?
          set -e
          test "$code" = "2"
          test ! -s stdout.txt
          grep -q "authentication failure" stderr.txt
          # create is still stubbed (Phase 4a work) — confirm exit 1 + NotImplemented.
          set +e
          "$PEAT" create contacts --from doc.json > /dev/null 2> stderr.txt
          code=$?
          set -e
          test "$code" = "1"
          grep -q "not yet implemented" stderr.txt

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: helm lint
        run: helm lint chart/peat-node/
      - name: helm template (render check)
        run: helm template chart/peat-node/ > /dev/null
