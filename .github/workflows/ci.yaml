name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      # peat-cli's e2e binary spawns the real `peat` binary as a
      # subprocess for every test and exercises a live mesh sync
      # against an in-process TestPeer over loopback Iroh. Running it
      # alongside `peat-node`'s heavier integration tests on a 2-core
      # GitHub Linux runner produces enough contention to starve the
      # subprocesses' tokio runtimes — initial sync drains miss the
      # CLI's POST_JOIN_SETTLE window and tests that pre-seed via
      # `peer.store.put` race the CLI's join handshake. The
      # `Cross-platform (macos-14)` job (further down this workflow)
      # already isolates peat-cli with `cargo test -p peat-cli`; mirror
      # that here so the Linux signal matches the macOS one. The other
      # workspace members keep the parallel `--workspace` path.
      - run: cargo test --workspace --exclude peat-cli
      - name: Run peat-cli tests in isolation
        run: cargo test -p peat-cli

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo build --workspace --release
      - name: peat binary smoke test
        run: |
          set -euo pipefail
          PEAT=./target/release/peat
          test -x "$PEAT"
          "$PEAT" --version
          "$PEAT" --help > /dev/null
          for sub in query observe create update delete; do
            "$PEAT" "$sub" --help > /dev/null
          done
          # query handler is wired (Phase 2). With a non-existent creds path
          # it must exit 2 (auth) per the ADR-001 exit-code table, with
          # empty stdout and the explanation on stderr.
          set +e
          "$PEAT" --creds /nonexistent.yaml query contacts > stdout.txt 2> stderr.txt
          code=$?
          set -e
          test "$code" = "2"
          test ! -s stdout.txt
          grep -q "authentication failure" stderr.txt
          # observe is wired (Phase 3) — same auth-failure path as query when
          # creds are absent.
          set +e
          "$PEAT" --creds /nonexistent.yaml observe contacts > stdout.txt 2> stderr.txt
          code=$?
          set -e
          test "$code" = "2"
          test ! -s stdout.txt
          grep -q "authentication failure" stderr.txt
          # create --dry-run skips the join prelude — confirm it renders.
          "$PEAT" create contacts --id c-1 --set name=alice --dry-run > stdout.txt 2> /dev/null
          grep -q '"op": "create"' stdout.txt
          grep -q '"key": "contacts:c-1"' stdout.txt
          # update --from reads the proposed JSON before the join prelude
          # (peat-mesh#187 / rc.28). A missing path surfaces as exit 4
          # (Malformed) with no mesh handshake attempted.
          set +e
          "$PEAT" update contacts/c-1 --from /nonexistent.json > /dev/null 2> stderr.txt
          code=$?
          set -e
          test "$code" = "4"

  cross-platform:
    # Phase 6 of peat-node ADR-001: confirms peat-cli builds (and tests, on
    # macOS) on the non-Linux targets the operator quickstart promises.
    # Closes the 'Windows in Constraints but not in CI gates' QA finding.
    name: Cross-platform (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14   # Apple Silicon (aarch64)
            test: true
          - os: windows-latest   # x86_64
            test: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-xplat-${{ hashFiles('**/Cargo.lock') }}
      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf
      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install protoc -y --no-progress
      # macOS builds the whole workspace; Windows builds peat-cli only.
      # The peat-node root crate uses Unix-only crates (e.g. iroh's
      # underlying transport pulls in libc) that the Windows port hasn't
      # been validated against. Phase 6's commitment is to ship `peat`
      # binaries — peat-node remains Linux/macOS only.
      - name: Build peat-cli (Windows)
        if: runner.os == 'Windows'
        run: cargo build -p peat-cli --release
      - name: Build workspace (macOS)
        if: runner.os == 'macOS'
        run: cargo build --workspace --release
      - name: Run peat-cli tests (macOS only)
        if: matrix.test
        run: cargo test -p peat-cli

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
      - name: helm lint
        run: helm lint chart/peat-node/
      - name: helm template (render check)
        run: helm template chart/peat-node/ > /dev/null
