name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      # peat-cli is excluded here: its deterministic tests run in the next
      # step, and its e2e binary runs on the self-hosted `peat-cli-e2e` job.
      - run: cargo test --workspace --exclude peat-cli
      # peat-cli's deterministic tests (lib unit + parser) run here. The e2e
      # binary (real Iroh QUIC sync over loopback) needs real CPU + a real
      # network stack and runs on the self-hosted `peat-cli-e2e` job instead —
      # on this 2-core container it was ~40-50% flaky (contention starves the
      # subprocess tokio runtimes) and mDNS multicast doesn't work at all.
      - name: Run peat-cli unit + parser tests
        run: |
          cargo test -p peat-cli --lib
          cargo test -p peat-cli --test cli_parser

  peat-cli-e2e:
    name: peat-cli e2e (self-hosted)
    # Same self-hosted runner as the QA review job: real cores (no tokio-runtime
    # starvation under the loopback-QUIC contention that flakes hosted runners)
    # and a real network stack (loopback multicast works, so the mDNS discovery
    # test runs for real via `--include-ignored`).
    runs-on: peat-arm64-linux-gb10-node
    # Fork-PR guard: never run untrusted PR code on self-hosted hardware.
    # Same-repo PRs and push events run; fork PRs are skipped.
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    # Serialize e2e on the shared self-hosted runner: at most one run at a
    # time, queued rather than cancelling. Prevents pileup and stops
    # concurrent runs' mDNS advertisements from cross-talking on the host's
    # loopback.
    #
    # This group is SHARED with peat-mesh's `P2P Functional Tests` job
    # (peat-mesh#295) — both run on the same physical `gb10` self-hosted
    # runner under repo-specific labels (`peat-arm64-linux-gb10-node` here,
    # `peat-arm64-linux-gb10-mesh` in peat-mesh), and GitHub Actions only
    # serializes runs whose `group` strings are byte-identical, so the name
    # must match exactly. `cancel-in-progress` changed true->false: with a
    # shared group, `true` would let this job cancel a peat-mesh P2P run
    # that's already mid-test on the same box (or vice versa) — queueing
    # instead avoids one repo's CI silently killing the other's in-flight
    # network test.
    concurrency:
      group: peat-cli-e2e-self-hosted
      cancel-in-progress: false
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      # dtolnay/rust-toolchain is a JavaScript action: it resolves the runner
      # user's real home via Node.js os.homedir() (reads /etc/passwd directly),
      # bypassing the non-login-shell $HOME gap that made the old getent-passwd
      # workaround fragile. It adds the toolchain bin dir to $GITHUB_PATH at the
      # runner-daemon level, so subsequent run steps see cargo unconditionally.
      # Fast path when the toolchain is already installed; installs it if missing.
      - uses: dtolnay/rust-toolchain@stable
      # Repair the runner's .path file so cargo is on PATH for ALL future jobs
      # on this runner — not just those that include the toolchain action above.
      # Idempotent: skips if cargo bin is already present in .path. Uses
      # $RUNNER_WORKSPACE (set by the Actions daemon) to locate the runner root
      # without relying on $HOME. continue-on-error so a path-file layout change
      # never blocks tests.
      - name: Repair runner .path (persistent cargo PATH fix)
        continue-on-error: true
        run: |
          REAL_HOME="$(getent passwd "$(id -un)" | cut -d: -f6)"
          RUNNER_PATH_FILE="$(dirname "$RUNNER_WORKSPACE")/.path"
          if [ -f "$RUNNER_PATH_FILE" ]; then
            if ! grep -qF "$REAL_HOME/.cargo/bin" "$RUNNER_PATH_FILE"; then
              echo "$REAL_HOME/.cargo/bin:$(cat "$RUNNER_PATH_FILE")" > "$RUNNER_PATH_FILE"
              echo "Prepended $REAL_HOME/.cargo/bin to $RUNNER_PATH_FILE"
            else
              echo ".path already contains cargo bin — no change needed"
            fi
          else
            echo "Runner .path not found at $RUNNER_PATH_FILE — skipping"
          fi
      - name: Run peat-cli e2e tests (incl. mDNS via --include-ignored)
        run: cargo test -p peat-cli --test e2e -- --include-ignored

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo build --workspace --release
      - name: peat binary smoke test
        run: |
          set -euo pipefail
          PEAT=./target/release/peat
          test -x "$PEAT"
          "$PEAT" --version
          "$PEAT" --help > /dev/null
          for sub in query observe create update delete; do
            "$PEAT" "$sub" --help > /dev/null
          done
          # query handler is wired (Phase 2). With a non-existent creds path
          # it must exit 2 (auth) per the ADR-001 exit-code table, with
          # empty stdout and the explanation on stderr.
          set +e
          "$PEAT" --creds /nonexistent.yaml query contacts > stdout.txt 2> stderr.txt
          code=$?
          set -e
          test "$code" = "2"
          test ! -s stdout.txt
          grep -q "authentication failure" stderr.txt
          # observe is wired (Phase 3) — same auth-failure path as query when
          # creds are absent.
          set +e
          "$PEAT" --creds /nonexistent.yaml observe contacts > stdout.txt 2> stderr.txt
          code=$?
          set -e
          test "$code" = "2"
          test ! -s stdout.txt
          grep -q "authentication failure" stderr.txt
          # create --dry-run skips the join prelude — confirm it renders.
          "$PEAT" create contacts/c-1 --set name=alice --dry-run > stdout.txt 2> /dev/null
          grep -q '"op": "create"' stdout.txt
          grep -q '"key": "contacts:c-1"' stdout.txt
          # update --from reads the proposed JSON before the join prelude
          # (peat-mesh#187 / rc.28). A missing path surfaces as exit 4
          # (Malformed) with no mesh handshake attempted.
          set +e
          "$PEAT" update contacts/c-1 --from /nonexistent.json > /dev/null 2> stderr.txt
          code=$?
          set -e
          test "$code" = "4"

  cross-platform:
    # Phase 6 of peat-node ADR-001: confirms peat-cli builds (and tests, on
    # macOS) on the non-Linux targets the operator quickstart promises.
    # Closes the 'Windows in Constraints but not in CI gates' QA finding.
    name: Cross-platform (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14   # Apple Silicon (aarch64)
            test: true
          - os: windows-latest   # x86_64
            test: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-xplat-${{ hashFiles('**/Cargo.lock') }}
      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf
      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        # Pull protoc from GitHub releases via the maintained action rather
        # than the community Chocolatey feed, which intermittently 504s and
        # fails the build with "Could not find protoc".
        uses: arduino/setup-protoc@v3
        with:
          # Avoid the action's unauthenticated latest-release lookup, which
          # can fail transiently on hosted Windows runners.
          version: "23.2"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # macOS builds the whole workspace; Windows builds peat-cli only.
      # The peat-node root crate uses Unix-only crates (e.g. iroh's
      # underlying transport pulls in libc) that the Windows port hasn't
      # been validated against. Phase 6's commitment is to ship `peat`
      # binaries — peat-node remains Linux/macOS only.
      - name: Build peat-cli (Windows)
        if: runner.os == 'Windows'
        run: cargo build -p peat-cli --release
      - name: Build workspace (macOS)
        if: runner.os == 'macOS'
        run: cargo build --workspace --release
      # Deterministic peat-cli tests only (lib unit + parser). The e2e binary
      # runs on the self-hosted `peat-cli-e2e` job — it's contention-flaky on
      # hosted runners. This job still validates the macOS/aarch64 build above.
      - name: Run peat-cli unit + parser tests (macOS only)
        if: matrix.test
        run: |
          cargo test -p peat-cli --lib
          cargo test -p peat-cli --test cli_parser

  package-upgrade:
    name: Package install and upgrade
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install package build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          cargo install cargo-deb --locked
          cargo install cargo-generate-rpm --locked
      - name: Build packages
        run: |
          cargo build --release --workspace
          cargo deb --no-build
          cargo generate-rpm
      - name: Test Debian systemd install and upgrade
        run: |
          sudo install -d -o root -g root -m 0750 /var/lib/peat-node/automerge
          sudo touch /var/lib/peat-node/automerge/legacy-state
          sudo apt-get install -y "$PWD"/target/debian/*.deb
          test "$(systemctl is-active peat-node.service)" = active
          test "$(systemctl show -p User --value peat-node.service)" = peat
          test "$(sudo stat -c %U:%G /var/lib/peat-node/automerge/legacy-state)" = peat:peat
          test -s /etc/peat-node/peat-node.env
          sudo grep -qx '# PEAT_NODE_SHARED_KEY=' /etc/peat-node/peat-node.env
          test ! -e /etc/peat-node.env
          test -f /usr/share/peat-node/peat-node.env.example
          old_pid="$(systemctl show -p MainPID --value peat-node.service)"
          sudo chown root:root /var/lib/peat-node/automerge/legacy-state
          sudo truncate -s 0 /etc/peat-node/peat-node.env
          sudo apt-get install --reinstall -y "$PWD"/target/debian/*.deb
          test "$(systemctl is-active peat-node.service)" = active
          test "$(sudo stat -c %U:%G /var/lib/peat-node/automerge/legacy-state)" = peat:peat
          test -s /etc/peat-node/peat-node.env
          sudo grep -qx '# PEAT_NODE_SHARED_KEY=' /etc/peat-node/peat-node.env
          test "$(stat -c %U:%G:%a /etc/peat-node)" = root:root:755
          test "$(stat -c %U:%G:%a /etc/peat-node/peat-node.env)" = root:peat:640
          new_pid="$(systemctl show -p MainPID --value peat-node.service)"
          test "$new_pid" != "$old_pid"
          curl --retry 20 --retry-delay 1 --retry-all-errors \
            http://127.0.0.1:50051/ >/dev/null
          sudo apt-get remove -y peat-node
          test ! -e /lib/systemd/system/peat-node.service
      - name: Test RPM ownership migration
        run: |
          docker run --rm \
            -v "$PWD/target/generate-rpm:/packages:ro" \
            fedora:latest bash -euxo pipefail -c '
              install -d -o root -g root -m 0750 /var/lib/peat-node/automerge
              touch /var/lib/peat-node/automerge/legacy-state
              dnf install -y /packages/*.rpm
              test "$(stat -c %U:%G /var/lib/peat-node/automerge/legacy-state)" = peat:peat
              test -s /etc/peat-node/peat-node.env
              grep -qx "# PEAT_NODE_SHARED_KEY=" /etc/peat-node/peat-node.env
              test ! -e /etc/peat-node.env
              test -f /usr/share/peat-node/peat-node.env.example
              chown root:root /var/lib/peat-node/automerge/legacy-state
              truncate -s 0 /etc/peat-node/peat-node.env
              dnf reinstall -y /packages/*.rpm
              test "$(stat -c %U:%G /var/lib/peat-node/automerge/legacy-state)" = peat:peat
              test -s /etc/peat-node/peat-node.env
              grep -qx "# PEAT_NODE_SHARED_KEY=" /etc/peat-node/peat-node.env
              test "$(stat -c %U:%G:%a /etc/peat-node)" = root:root:755
              test "$(stat -c %U:%G:%a /etc/peat-node/peat-node.env)" = root:peat:640
              dnf remove -y peat-node
              test ! -e /usr/lib/systemd/system/peat-node.service
            '

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
      - name: helm lint
        run: helm lint chart/peat-node/
      - name: helm template (render check)
        run: helm template chart/peat-node/ > /dev/null
