{{- if .Values.discovery.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "peat-node.fullname" . }}-discovery
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "peat-node.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "peat-node.fullname" . }}-discovery
subjects:
  - kind: ServiceAccount
    name: {{ include "peat-node.fullname" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
