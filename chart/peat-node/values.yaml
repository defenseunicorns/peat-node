# peat-node Helm chart values

# -- Container image
image:
  repository: ghcr.io/defenseunicorns/peat-node
  tag: v0.1.1
  pullPolicy: IfNotPresent

# -- gRPC listen address (inside the pod)
# Use "unix:///tmp/peat.sock" for Unix socket or "tcp://127.0.0.1:50051" for TCP.
# Unix socket is preferred for sidecar-to-app communication (no port conflicts).
listen: "tcp://127.0.0.1:50051"

# -- Node identifier. If empty, a random UUID is generated on startup.
nodeId: ""

# -- Formation/application identifier for group authentication
appId: "peat-default"

# -- Base64-encoded 32-byte shared key for formation authentication
sharedKey: ""

# -- Base64-encoded 32-byte AES-256-GCM key for encrypting document content at rest.
# When set, all document payloads are encrypted before storage.
# Can reference a K8s secret via encryptionKeySecret instead of a literal value.
encryptionKey: ""
encryptionKeySecret:
  name: ""
  key: ""

# -- Peer endpoint IDs to connect to on startup (comma-separated or list)
peers: []

# -- Auto-start CRDT sync on boot
autoSync: true

# -- Pin the Iroh QUIC UDP port. 0 (default) selects an ephemeral port at
# startup. Pin to a known value for deployments where peers reach this
# node via a stable UDP host:port — Docker Compose, k3d-on-shared-network,
# fleet-managed sidecars with NodePort/hostPort exposure. The n0 public
# relay is disabled by default in the binary, so peers either need a
# direct address (this port, exposed somehow) or an explicit relay URL
# passed through `ConnectPeer.relay_url` at runtime.
irohUdpPort: 0

# -- When irohUdpPort > 0, also expose it as a `hostPort` on the pod.
# Useful for k3d-style multi-cluster setups on a shared Docker network
# where pods in *other* clusters reach this node at the k3d node's
# hostname:port. Default false (sidecar-only consumers don't need it).
irohUdpHostPort: false

# -- Agent watcher: poll a co-located service (e.g. UDS Remote Agent)
# Set agentAddr to enable. Example: http://localhost:8080 or https://localhost:8080
agentAddr: ""
agentPollInterval: 10

# -- Agent watcher mTLS: provide a Kubernetes Secret containing tls.crt, tls.key, and ca.crt
# The secret is mounted at /etc/peat-node/agent-tls/
agentTls:
  enabled: false
  secretName: ""

# -- Persistent storage for Automerge CRDT state and Iroh blobs
persistence:
  enabled: false
  storageClass: ""
  size: 1Gi
  accessModes:
    - ReadWriteOnce

# -- Pod resource requests and limits (sidecar is lightweight)
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# -- Verbose logging
verbose: false

# -- UDS Operator Package CR (enables NetworkPolicies)
package:
  enabled: false
  serviceMeshMode: ""
  additionalNetworkAllow: []
