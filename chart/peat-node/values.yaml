# peat-node Helm chart values

# -- Container image
image:
  repository: ghcr.io/defenseunicorns/peat-node
  tag: v0.4.5
  pullPolicy: IfNotPresent

# -- gRPC listen address (inside the pod)
# Use "unix:///tmp/peat.sock" for Unix socket or "tcp://127.0.0.1:50051" for TCP.
# Unix socket is preferred for sidecar-to-app communication (no port conflicts).
listen: "tcp://127.0.0.1:50051"

# -- Node identifier. If empty, a random UUID is generated on startup.
nodeId: ""

# -- Formation/application identifier for group authentication
appId: "peat-default"

# -- Base64-encoded 32-byte shared key for formation authentication
sharedKey: ""

# -- Base64-encoded 32-byte AES-256-GCM key for encrypting document content at rest.
# When set, all document payloads are encrypted before storage.
# Can reference a K8s secret via encryptionKeySecret instead of a literal value.
encryptionKey: ""
encryptionKeySecret:
  name: ""
  key: ""

# -- Peer endpoint IDs to connect to on startup (comma-separated or list)
peers: []

# -- Auto-start CRDT sync on boot
autoSync: true

# -- Pin the Iroh QUIC UDP port. 0 (default) selects an ephemeral port at
# startup. Pin to a known value for deployments where peers reach this
# node via a stable UDP host:port — Docker Compose, k3d-on-shared-network,
# fleet-managed sidecars with NodePort/hostPort exposure. The n0 public
# relay is disabled by default in the binary, so peers either need a
# direct address (this port, exposed somehow) or an explicit relay URL
# passed through `ConnectPeer.relay_url` at runtime.
irohUdpPort: 0

# -- When irohUdpPort > 0, also expose it as a `hostPort` on the pod.
# Useful for k3d-style multi-cluster setups on a shared Docker network
# where pods in *other* clusters reach this node at the k3d node's
# hostname:port. Default false (sidecar-only consumers don't need it).
irohUdpHostPort: false

# -- Agent watcher: poll a co-located service (e.g. UDS Remote Agent)
# Set agentAddr to enable. Example: http://localhost:8080 or https://localhost:8080
agentAddr: ""
agentPollInterval: 10

# -- Agent watcher mTLS: provide a Kubernetes Secret containing tls.crt, tls.key, and ca.crt
# The secret is mounted at /etc/peat-node/agent-tls/
agentTls:
  enabled: false
  secretName: ""

# -- Persistent storage for Automerge CRDT state and Iroh blobs
persistence:
  enabled: false
  storageClass: ""
  size: 1Gi
  accessModes:
    - ReadWriteOnce

# -- Pod resource requests and limits (sidecar is lightweight)
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# -- Attachment distribution (PRD-006).
#
# Safety default: with `roots` empty, the four attachment RPCs
# (SendAttachments / GetAttachmentDistribution / SubscribeAttachmentBundle
# / CancelAttachmentDistribution) return Unimplemented. Operators must
# explicitly name the directory roots that may be read by setting one or
# more `roots` entries AND providing the matching volume mounts via
# `extraVolumes` / `extraVolumeMounts`.
#
# Example wiring (uncomment to enable an "outbox" root backed by a PVC):
#
#   attachment:
#     roots:
#       outbox: /var/lib/peat/outbox
#     extraVolumes:
#       - name: peat-attachment-outbox
#         persistentVolumeClaim:
#           claimName: peat-attachment-outbox
#     extraVolumeMounts:
#       - name: peat-attachment-outbox
#         mountPath: /var/lib/peat/outbox
#         readOnly: true
#
# Any volume source is supported (emptyDir, hostPath, configMap, csi,
# etc.) — the chart only wires the env var and threads the mounts; the
# volume provisioning is operator-supplied.
attachment:
  # Allowlisted root name → in-container mount path. Empty means the
  # attachment RPCs return Unimplemented.
  roots: {}

  # Additional volumes for the attachment roots. Items are appended to
  # the pod's `volumes` list verbatim.
  extraVolumes: []

  # Additional volume mounts for the peat-node container. Items are
  # appended to `volumeMounts` verbatim.
  extraVolumeMounts: []

  # Per-file size cap (bytes). Files larger than this are rejected
  # ResourceExhausted at validation. Default 256 MiB.
  maxFileBytes: 268435456

  # Per-request total-bytes cap. Bundles whose `Σ size_bytes` exceeds
  # this are rejected ResourceExhausted. Default 1 GiB.
  maxBundleBytes: 1073741824

  # Per-request file-count cap.
  maxFilesPerBundle: 64

  # Cap on `NodeListScope.node_ids.len()`.
  maxNodeListLen: 256

  # In-flight distribution cap. Requests beyond this are rejected
  # ResourceExhausted unless queueWhenFull is true.
  maxConcurrentDistributions: 4

  # If true, accept and queue requests beyond the in-flight cap; else
  # reject. (The queue path itself is deferred to v2; v1 honors the knob
  # but does not yet wait for in-flight slots.)
  queueWhenFull: false

  # Default AttachmentPriority when caller leaves it UNSPECIFIED.
  # Values: bulk | low | routine | priority | critical.
  defaultPriority: routine

  # Grace window (seconds) for unknown node IDs in NodeListScope before
  # they are marked FAILED. (v1 records the knob; the background
  # promoter is deferred — see attachments_deferred_test.rs test 25.)
  discoveryGraceSecs: 30

  # How long terminal bundles' handle tables are retained for bundle_id
  # lookups, SubscribeAttachmentBundle late-attach, and AlreadyExists
  # enforcement. 0 disables retention (discouraged). Default 24h.
  handleRetentionSecs: 86400

  # Hard cap on handle-table size; LRU eviction triggers before the
  # retention window expires when exceeded.
  maxKnownBundles: 4096

  # Receive-side inbox path (PRD-006 v1.1). When set, peat-node spawns a
  # background watcher that polls the synced `file_distributions` collection,
  # fetches blobs targeting this node's iroh endpoint, and writes them to
  # `{inbox}/{distribution_id}/{filename}`. Unset (default) disables
  # receive-side delivery. The directory is created if missing.
  # Requires a matching volume mount via `extraVolumeMounts`.
  inbox: ""

  # Inbox watcher poll interval in seconds. Smaller = faster delivery,
  # more `file_distributions` scans. Default 1s.
  inboxPollSecs: 1

# -- Disable mDNS peer discovery.
# mDNS is on by default in the binary, but multicast is unavailable in
# Kubernetes / containers, so the chart defaults to true. Set false only
# for bare-metal deployments that use the chart and want automatic
# same-host peer discovery.
disableMdns: true

# -- Kubernetes peer-discovery via EndpointSlice watching (peat-node#63).
# Requires peat-mesh >= 0.9.0-rc.39 (deterministic iroh keypair feature).
# When enabled:
#   - A ServiceAccount, Role, and RoleBinding are created for EndpointSlice RBAC.
#   - A headless Service is created so K8s generates EndpointSlices for this Deployment.
#   - POD_NAME is injected via the downward API so each pod can derive its iroh identity.
#   - Each pod derives a deterministic iroh SecretKey from (sharedKey, POD_NAME) using
#     HKDF-SHA256 — peers can compute each other's EndpointId without out-of-band exchange.
# NOTE: K8s discovery requires a fixed iroh UDP port. Set irohUdpPort to a non-zero
# value when enabling discovery so EndpointSlices carry the correct port.
discovery:
  enabled: false
  # Namespace to watch for EndpointSlices. Defaults to the release namespace.
  namespace: ""
  # Label selector used by KubernetesDiscovery to filter peer pods.
  # Must match the labels on peat-node pods in the target namespace.
  labelSelector: "app.kubernetes.io/name=peat-node"
  # Annotation prefix for peat-mesh metadata on pod objects.
  annotationPrefix: "peat."
  # EndpointSlice poll interval (seconds).
  intervalSecs: 30

# -- Verbose logging
verbose: false

# -- UDS Operator Package CR (enables NetworkPolicies)
package:
  enabled: false
  serviceMeshMode: ""
  additionalNetworkAllow: []
