apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "peat-sidecar.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "peat-sidecar.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "peat-sidecar.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "peat-sidecar.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        {{- include "peat-sidecar.container" . | nindent 8 }}
      volumes:
        {{- include "peat-sidecar.volumes" . | nindent 8 }}
