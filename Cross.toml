[target.aarch64-unknown-linux-gnu]
pre-build = [
    "apt-get update && apt-get install -y curl unzip",
    "curl -LO https://github.com/protocolbuffers/protobuf/releases/download/v25.1/protoc-25.1-linux-x86_64.zip && echo 'ed8fca87a11c888fed329d6a59c34c7d436165f662a2c875246ddb1ac2b6dd50  protoc-25.1-linux-x86_64.zip' | sha256sum -c && unzip protoc-25.1-linux-x86_64.zip -d /usr/local && rm protoc-25.1-linux-x86_64.zip"
]
