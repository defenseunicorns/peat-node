# Two-node peat-node mesh, runnable end-to-end on a single Docker host.
#
# Quickstart:
#   docker compose up -d
#   ./bootstrap.sh   # peer the two nodes
#   ./demo.sh        # write on node-a, read on node-b, verify CRDT sync
#   docker compose down -v
#
# Both nodes share the same app_id + shared_key, so they're in the same
# formation. They peer over direct UDP between containers on the compose
# bridge network — **no public internet required**. Each node pins its
# Iroh QUIC UDP port; bootstrap.sh tells node-b to reach node-a at
# `peat-node-a:51071` (Docker's embedded DNS resolves the service name).

services:
  peat-node-a:
    # Latest published release. For testing changes ahead of a release, comment
    # this out and uncomment the `build:` block to build from the repo root.
    image: ghcr.io/defenseunicorns/peat-node:v0.4.3
    # build:
    #   context: ../..
    container_name: peat-node-a
    environment:
      # Bind to all interfaces so the host port mapping works.
      PEAT_NODE_LISTEN: tcp://0.0.0.0:50051
      PEAT_NODE_DATA_DIR: /data/peat-node
      PEAT_NODE_NODE_ID: node-a
      PEAT_NODE_APP_ID: compose-demo
      # Demo formation key (32 zero bytes, base64-encoded). Generate your
      # own for any non-demo use: `head -c 32 /dev/urandom | base64`
      PEAT_NODE_SHARED_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      PEAT_NODE_AUTO_SYNC: "true"
      # Pin Iroh's UDP port so node-b can reach us directly. n0 public
      # relay is off by default in the binary.
      PEAT_NODE_IROH_UDP_PORT: "51071"
      RUST_LOG: peat_node=info,peat_mesh=warn
    ports:
      - "50061:50051"
    volumes:
      - peat-node-a-data:/data/peat-node

  peat-node-b:
    image: ghcr.io/defenseunicorns/peat-node:v0.4.3
    # build:
    #   context: ../..
    container_name: peat-node-b
    environment:
      PEAT_NODE_LISTEN: tcp://0.0.0.0:50051
      PEAT_NODE_DATA_DIR: /data/peat-node
      PEAT_NODE_NODE_ID: node-b
      PEAT_NODE_APP_ID: compose-demo
      PEAT_NODE_SHARED_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      PEAT_NODE_AUTO_SYNC: "true"
      PEAT_NODE_IROH_UDP_PORT: "51072"
      RUST_LOG: peat_node=info,peat_mesh=warn
    ports:
      - "50062:50051"
    volumes:
      - peat-node-b-data:/data/peat-node

volumes:
  peat-node-a-data:
  peat-node-b-data:
